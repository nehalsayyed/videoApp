name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get Flutter version from pubspec
        id: flutter_version
        run: |
          # Extracts the sdk version (e.g., 3.41) from pubspec.yaml
          SDK_VERSION=$(grep 'sdk:' pubspec.yaml | head -n 1 | sed 's/.*sdk: //; s/"//g; s/\^//; s/ //g')
          echo "FLUTTER_VERSION=$SDK_VERSION" >> $GITHUB_ENV
          echo "Detected Flutter SDK: $SDK_VERSION"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/*.apk
          
